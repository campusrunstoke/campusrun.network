name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    name: Lint · Typecheck · Unit · Build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: campusrun
          POSTGRES_PASSWORD: campusrun
          POSTGRES_DB: campusrun
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U campusrun -d campusrun"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgres://campusrun:campusrun@localhost:5432/campusrun
      ADMIN_USER: admin
      ADMIN_PASSWORD: ci-password
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run db:migrate
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  e2e:
    name: E2E (mobile Safari + Chrome)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: campusrun
          POSTGRES_PASSWORD: campusrun
          POSTGRES_DB: campusrun
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U campusrun -d campusrun"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgres://campusrun:campusrun@localhost:5432/campusrun
      ADMIN_USER: admin
      ADMIN_PASSWORD: ci-password
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run db:migrate
      - run: npm run build
      - run: npx playwright install --with-deps chromium webkit
      - name: Start production server
        run: |
          PORT=3210 npm run start &
          for i in $(seq 1 60); do curl -sf http://localhost:3210/stoked && break; sleep 1; done
      - name: Run e2e against prod build
        env:
          E2E_BASE_URL: http://localhost:3210
        run: npm run e2e
